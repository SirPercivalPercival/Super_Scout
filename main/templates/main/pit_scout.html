
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Scout</title>
    <link rel="manifest" href="static\manifest.json">
    <meta name="theme-color" content="#00ffff">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static\styles.css">
    <style>
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Bebas Neue', sans-serif;
            background-color: rgb(0, 217, 255);
            color: black;
        }
        
        
        .sections-container {
            display: flex;
            justify-content: flex-start;
            align-items: stretch;
            width: 100%;
            flex-wrap: nowrap;
            padding-left: 0;
        }
        
        
        .section {
            border: 2px solid black;
            padding: 15px;
            background: white;
            margin: 10px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            height: 400px;
            min-width: 0px;
            flex: 1; 
            max-width: 300px; 
        }
        
       
        #team-section, #scoring, #mobility {
            height: 400px;
            margin-left: 20px;
        }
        #team-section {
            margin-left: 0;
        }
        
       
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
        }
        
        .button-group button {
            background-color: red;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100px;
            height: 50px;
            border-radius: 5px;
            transition: background 0.3s ease-in-out;
        }
        
        .button-group button.active {
            background-color: green;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .team-number-box {
            border: 2px solid #4CAF50;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background-color: #f9f9f9;
            font-size: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .pit-scout-button {
            padding: 25px 50px;
            font-family: Impact, sans-serif;
            font-size: clamp(32px, 7vw, 46px);
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .pit-scout-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
        
        
        .button-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        #restart-button {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
        }
        
        #restart-button:hover {
            background-color: #cc0000;
        }
        
        
        @media (max-width: 768px) {
            .sections-container {
                flex-direction: column;
                align-items: center;
            }
            .section {
                width: 90%;
                max-width: 300px;
            }
        }
        
        


    </style>
</head>
<body>
    <div class="button-container">
        <a id="redirect-button" href="https://sirpercivalpercival.github.io/Super_Scout/" class="pit-scout-button">Go to Main Page</a>
    </div>

        <div class="sections-container">
            <div class="section" id="team-section">
                <h2>TEAM NUMBERS</h2>
                <div id="team-number-1" class="team-number-box">Team 1:</div>
                <div id="team-number-2" class="team-number-box">Team 2:</div>
                <div id="team-number-3" class="team-number-box">Team 3:</div>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function () {
                    
                    const teamNumber1 = localStorage.getItem("teamNumber1") || "N/A";
                    const teamNumber2 = localStorage.getItem("teamNumber2") || "N/A";
                    const teamNumber3 = localStorage.getItem("teamNumber3") || "N/A";
                
                    
                    console.log("Retrieved Team Numbers:", {
                        teamNumber1: teamNumber1,
                        teamNumber2: teamNumber2,
                        teamNumber3: teamNumber3
                    });
                
                    
                    document.getElementById("team-number-1").textContent = `Team 1: ${teamNumber1}`;
                    document.getElementById("team-number-2").textContent = `Team 2: ${teamNumber2}`;
                    document.getElementById("team-number-3").textContent = `Team 3: ${teamNumber3}`;
                });
            </script>
        <div class="section" id="driver-awareness">
            <h2>DRIVER AWARENESS</h2>
            <div class="button-group">
                <div class="button-row">
                    <button onclick="selectButton(this, 'driver-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'driver-awareness', 2)">2</button>
                    <button onclick="selectButton(this, 'driver-awareness', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'driver-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'driver-awareness', 2)">2</button>
                    <button onclick="selectButton(this, 'driver-awareness', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'driver-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'driver-awareness', 2)">2</button>
                    <button onclick="selectButton(this, 'driver-awareness', 3)">3</button>
                </div>
            </div>
        </div>
        <div class="section" id="mobility">
            <h2>MOBILITY</h2>
            <div class="button-group">
                <div class="button-row">
                    <button onclick="selectButton(this, 'mobility', 1)">1</button>
                    <button onclick="selectButton(this, 'mobility', 2)">2</button>
                    <button onclick="selectButton(this, 'mobility', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'mobility', 1)">1</button>
                    <button onclick="selectButton(this, 'mobility', 2)">2</button>
                    <button onclick="selectButton(this, 'mobility', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'mobility', 1)">1</button>
                    <button onclick="selectButton(this, 'mobility', 2)">2</button>
                    <button onclick="selectButton(this, 'mobility', 3)">3</button>
                </div>
            </div>
        </div>
        <div class="section" id="defense">
            <h2>DEFENSE</h2>
            <div class="button-group">
                <div class="button-row">
                    <button onclick="selectButton(this, 'defense', 1)">1</button>
                    <button onclick="selectButton(this, 'defense', 2)">2</button>
                    <button onclick="selectButton(this, 'defense', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'defense', 1)">1</button>
                    <button onclick="selectButton(this, 'defense', 2)">2</button>
                    <button onclick="selectButton(this, 'defense', 3)">3</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'defense', 1)">1</button>
                    <button onclick="selectButton(this, 'defense', 2)">2</button>
                    <button onclick="selectButton(this, 'defense', 3)">3</button>
                </div>
            </div>
        </div>
        <div class="section" id="human-player-awareness">
            <h2>HUMAN PLAYER AWARENESS</h2>
            <div class="button-group">
                <div class="button-row">
                    <button onclick="selectButton(this, 'human-player-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'human-player-awareness', 2)">2</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'human-player-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'human-player-awareness', 2)">2</button>
                </div>
                <div class="button-row">
                    <button onclick="selectButton(this, 'human-player-awareness', 1)">1</button>
                    <button onclick="selectButton(this, 'human-player-awareness', 2)">2</button>
                </div>
            </div>
            <button id="restart-button" style="margin-top: 10px;">Restart Selections</button>
        </div>
        <div class="section" id="scoring">
            <h2>ALGAE NET SCORING</h2>
            <div class="input-group">
                <label>Successfully Scored</label>
                <input type="number" id="successfully-scored" oninput="saveScoringData()" min="0">
                <label>Total Attempts</label>
                <input type="number" id="total-attempts" oninput="saveScoringData()" min="0">
                <label>Success Rate</label>
                <input type="text" id="success-rate" readonly>
            </div>
        </div>
    </div>

    <script>

        
        document.addEventListener("DOMContentLoaded", function () {
            
            let selectedTeams = {}; 
        
            window.selectButton = function(button, category, teamIndex) {
                
                let buttons = button.parentElement.children;
                for (let btn of buttons) {
                    btn.classList.remove("active");
                }
                button.classList.add("active");
        
                
                let teamNumber = localStorage.getItem(`teamNumber${teamIndex}`) || "N/A"; 
                selectedTeams[category] = teamNumber;
        
                
                updateAlgaeNetScoring();
            }
        
            function updateAlgaeNetScoring() {
                let scoringSection = document.getElementById("scoring");
                let algaeNetScoreText = document.getElementById("algae-net-score");
            
                
                const teamNumber1 = localStorage.getItem("teamNumber1") || "N/A";
                const teamNumber2 = localStorage.getItem("teamNumber2") || "N/A";
                const teamNumber3 = localStorage.getItem("teamNumber3") || "N/A";
            
                
                let humanPlayerAwarenessButtons = document.querySelectorAll("#human-player-awareness .button-group button.active");
            
                if (humanPlayerAwarenessButtons.length === 2) {
                    let selectedRows = [];
                    humanPlayerAwarenessButtons.forEach(button => {
                        
                        let row = Math.floor(Array.from(button.parentElement.parentElement.children).indexOf(button.parentElement));
                        selectedRows.push(row + 1); 
                    });
            
                    let chosenTeam = "N/A";
            
                    
                    if (selectedRows.includes(1) && selectedRows.includes(2)) {
                        chosenTeam = teamNumber3; 
                    } else if (selectedRows.includes(2) && selectedRows.includes(3)) {
                        chosenTeam = teamNumber1; 
                    } else if (selectedRows.includes(1) && selectedRows.includes(3)) {
                        chosenTeam = teamNumber2; 
                    }
            
                    if (!algaeNetScoreText) {
                        algaeNetScoreText = document.createElement("p");
                        algaeNetScoreText.id = "algae-net-score";
                        scoringSection.appendChild(algaeNetScoreText);
                    }
            
                    algaeNetScoreText.textContent = `Team Number Chosen: ${chosenTeam}`;
                } else {
                    if (!algaeNetScoreText) {
                        algaeNetScoreText = document.createElement("p");
                        algaeNetScoreText.id = "algae-net-score";
                        scoringSection.appendChild(algaeNetScoreText);
                    }
                    algaeNetScoreText.textContent = "Team Number Chosen: N/A";
                }
            }
        
            document.getElementById("restart-button").addEventListener("click", function () {
                selectedTeams = {}; 
                document.querySelectorAll(".button-group button").forEach(button => button.classList.remove("active"));
            });
        
            
            document.querySelectorAll(".button-group button").forEach(button => {
                button.addEventListener("click", function () {
                    let category = button.closest(".section").id;
                    let teamIndex = [...button.parentElement.children].indexOf(button) + 1;
                    selectButton(button, category, teamIndex);
                });
            });
        
            
            let usedRanks = {};
        
            function initialize() {
                const sections = ['driver-awareness', 'mobility', 'defense', 'human-player-awareness'];
                sections.forEach(section => {
                    usedRanks[section] = {};
                });
                restoreSelections();
                restoreScoringData(); 
            }
        
            function selectButton(button, sectionId, number) {
                const buttons = document.querySelectorAll(`#${sectionId} .button-group button`);
        
                if (sectionId === 'human-player-awareness') {
                    
                    if (!usedRanks[sectionId]) {
                        usedRanks[sectionId] = {};
                    }

                
                    
        
                    
                    if (usedRanks[sectionId][number]) {
                        
                        button.classList.remove("active");
                        button.style.backgroundColor = "red";
                        delete usedRanks[sectionId][number];
                    } else {
                        
                        const selectedKeys = Object.keys(usedRanks[sectionId] || {});
        
                        
                        if (selectedKeys.length >= 2) return;
        
                        
                        buttons.forEach(btn => {
                            if (btn.textContent === button.textContent && btn.classList.contains("active")) {
                                btn.classList.remove("active");
                                btn.style.backgroundColor = "red";
                                delete usedRanks[sectionId][btn.textContent];
                            }
                        });
        
                        
                        button.classList.add("active");
                        button.style.backgroundColor = "green";
                        usedRanks[sectionId][number] = true;
                    }
                    if (sectionId === 'human-player-awareness') {
                        handleHumanPlayerAwareness();
                    }
        
                    saveSelections();
                    return; 
                }
        
               
                const level = Math.floor(Array.from(buttons).indexOf(button) / 3) + 1;
                const levelButtons = Array.from(buttons).slice((level - 1) * 3, level * 3);
        
                levelButtons.forEach(btn => {
                    btn.classList.remove("active");
                    btn.style.backgroundColor = "red";
                    delete usedRanks[sectionId]?.[btn.textContent];
                });
        
                const columnIndex = (number - 1);
                for (let i = 0; i < 3; i++) {
                    const verticalButton = buttons[i * 3 + columnIndex];
                    if (verticalButton && verticalButton !== button) {
                        verticalButton.classList.remove("active");
                        verticalButton.style.backgroundColor = "red";
                        delete usedRanks[sectionId]?.[verticalButton.textContent]; 
                    }
                }
        
                button.classList.add("active");
                button.style.backgroundColor = "green";
        
                
                if (!usedRanks[sectionId]) {
                    usedRanks[sectionId] = {};
                }
                usedRanks[sectionId][number] = true;
        
                saveSelections();
            }
        
            function handleHumanPlayerAwareness() {
                const sectionId = 'human-player-awareness';
                const buttons = document.querySelectorAll(`#${sectionId} .button-group button`);
                const activeButtons = Array.from(buttons).filter(btn => btn.classList.contains("active"));
        
                if (activeButtons.length === 2) {
                   
                    const selectedRows = activeButtons.map(btn => {
                        return Math.floor(Array.from(buttons).indexOf(btn) / 2) + 1;
                    });
        
                    const allRows = [1, 2, 3];
                    const unselectedRow = allRows.find(row => !selectedRows.includes(row));
        
                   
                    if (unselectedRow !== undefined) {
                        const unselectedButtons = Array.from(buttons).slice((unselectedRow - 1) * 2, unselectedRow * 2);
                        unselectedButtons.forEach(btn => {
                            btn.style.backgroundColor = "grey";
                            btn.disabled = true;
                        });
                    }
                } else {
                    
                    buttons.forEach(btn => {
                        btn.style.backgroundColor = "red";
                        btn.disabled = false;
                    });
        
                    
                    activeButtons.forEach(btn => {
                        btn.style.backgroundColor = "green";
                    });
                }
            }
        
            function restartHumanPlayerAwareness() {
                const sectionId = 'human-player-awareness';
                usedRanks[sectionId] = {}; 
                document.querySelectorAll(`#${sectionId} .button-group button`).forEach(btn => {
                    btn.classList.remove("active");
                    btn.style.backgroundColor = "red"; 
                    btn.disabled = false;
                });
                saveSelections(); 
            }
        
            
            const restartButton = document.getElementById("restart-button");
            if (restartButton) {
                restartButton.onclick = restartHumanPlayerAwareness;
            }
        
            function saveSelections() {
                localStorage.setItem("usedRanks", JSON.stringify(usedRanks));
            }
        
            function restoreSelections() {
                const savedRanks = JSON.parse(localStorage.getItem("usedRanks")) || {};
                usedRanks = savedRanks;
        
                for (let sectionId in usedRanks) {
                    for (let number in usedRanks[sectionId]) {
                        let isActive = usedRanks[sectionId][number];
                        if (isActive) {
                            const buttons = document.querySelectorAll(`#${sectionId} .button-group button`);
                            buttons.forEach(button => {
                                if (parseInt(button.textContent) === parseInt(number)) {
                                    button.classList.add("active");
                                    button.style.backgroundColor = "green";
                                }
                            });
                        }
                    }
                }
        
               
                if (usedRanks['human-player-awareness']) {
                    handleHumanPlayerAwareness();
                }
            }
        
            function saveScoringData() {
                let successful = document.getElementById("successfully-scored").value;
                let total = document.getElementById("total-attempts").value;
        
                let successRate = (parseInt(successful) > 0 && parseInt(total) > 0)
                    ? ((successful / total) * 100).toFixed(2) + "%"
                    : "0%";
        
                document.getElementById("success-rate").value = successRate;
        
                const scoringData = {
                    successful,
                    total,
                    successRate
                };
                localStorage.setItem("scoringData", JSON.stringify(scoringData));
            }
        
            function restoreScoringData() {
                const data = JSON.parse(localStorage.getItem("scoringData")) || { successful: "", total: "", successRate: "" };
        
                const successfullyScored = document.getElementById("successfully-scored");
                const totalAttempts = document.getElementById("total-attempts");
                const successRate = document.getElementById("success-rate");
        
                if (successfullyScored) successfullyScored.value = data.successful;
                if (totalAttempts) totalAttempts.value = data.total;
                if (successRate) successRate.value = data.successRate || "0%";
            }
        
        
            const successfullyScored = document.getElementById("successfully-scored");
            const totalAttempts = document.getElementById("total-attempts");
        
            if (successfullyScored) {
                successfullyScored.addEventListener("input", saveScoringData);
            }
            if (totalAttempts) {
                totalAttempts.addEventListener("input", saveScoringData);
            }
        
            initialize();
        });
    </script>
</body>
</html>
